<!doctype html>
<html>
  <head>
    <title>device control</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/style.css">
    <script src="/lib/webcomponentsjs/webcomponents-lite.min.js"></script>
    <link rel="import" href="/lib/polymer/polymer.html">
    <link rel="import" href="/lib/paper-slider/paper-slider.html">
    <link rel="import" href="/lib/iron-ajax/iron-ajax.html">
    <link rel="import" href="../light9-collector-client.html">

    <script src="/lib/d3/build/d3.min.js"></script>
    <script src="/lib/N3.js-pull61/browser/n3-browser.js"></script>
    <script src="/lib/async/dist/async.js"></script>
    <script src="/lib/underscore/underscore-min.js"></script>
    <link rel="import" href="../rdfdb-synced-graph.html">
    <link rel="import" href="/resource-display.html">
  </head>
  <body>

    <dom-module id="light9-color-picker">
      <template>
        <style>
         :host {
             position: relative;
         }
         #smallRainbow, #largeRainbow { overflow: hidden; position: relative; }
         #smallRainbow {
             background: url(/colorpick_rainbow_small.png);
             width: 150px;
             height: 30px;
         }
         #largeRainbow {
             background: url(/colorpick_rainbow_large.png);
             width: 400px;
             height: 200px;
         }
         #smallCrosshair, #largeCrosshair {
             position: absolute;
             left: -60px;
             top: -62px;
             pointer-events: none;
             }
         #smallCrosshair {
             background: url(/colorpick_crosshair_small.png);
             width: 200px; 
             height: 166px;

         }
         #largeCrosshair {
             background: url(/colorpick_crosshair_large.png);
             width: 492px; 
             height: 409px;

         }
         #largeRainbowComp { display: none;    position: absolute;
    z-index: 10;
    left: -50px;
             top: -110px;
         }
        </style>
        <div id="smallRainbow" on-mouseenter="onEnterSmall"> <div id="smallCrosshair"></div></div>
        <div id="largeRainbowComp">
          <canvas id="largeRainbow"
                  on-mousemove="onCanvasMove"
                  on-mouseup="onCanvasUp"
                  on-mouseleave="onCanvasLeave"></canvas>
          <div id="largeCrosshair"></div>
        </div>
      </template>
      <script>
       HTMLImports.whenReady(function () {
           Polymer({
               is: "light9-color-picker",
               properties: {
               },
               ready: function() {
               },
               onEnterSmall: function() {
                   // not if we just closed the large one
                   this.$.largeRainbowComp.style.display = 'block';
               },
               onCanvasMove: function(ev) {
                   console.log('canvasmove');
               },
               onCanvasUp: function(ev) {
                   console.log('canvasup');
                   this.$.largeRainbowComp.style.display = 'none';
               },
               onCanvasLeave: function(ev) {
                   console.log('canvasleave');
                   this.$.largeRainbowComp.style.display = 'none';
               },
           });
       });
      </script>
    </dom-module>
    
       
    <dom-module id="light9-live-control">
      <template>
        <style>
         paper-slider { width: 100%; margin: -19px 0; }
        </style>

        <style is="custom-style">
         paper-slider {
             --paper-slider-knob-color: var(--paper-red-500);
             --paper-slider-active-color: var(--paper-red-500);

             --paper-slider-font-color: white;
             --paper-slider-input: {
                 width: 75px;

                 background: black;
             }
         }
         </style>

        <template is="dom-if" if="{{deviceAttr.useSlider}}">
          <paper-slider min="0"
                        max="{{deviceAttr.max}}"
                        step=".001"
                        editable
                        content-type="application/json"
                        immediate-value="{{immediateSlider}}"></paper-slider>
        </template>
        <template is="dom-if" if="{{deviceAttr.useColor}}">
          <input type="color"
                 id="col"
                 on-input="onPickedColor"
                 value="{{pickedColor}}">
          <button on-click="goWhite">white</button>
          <button on-click="goBlack">black</button>
          <light9-color-picker value="{{pickedColor}}"></light9-color-picker>
        </template>
        <template is="dom-if" if="{{deviceAttr.useChoice}}">
          <select size$="{{deviceAttr.choiceSize}}" value="{{pickedChoice::change}}">
            <option value="">None</option>
            <template is="dom-repeat" items="{{deviceAttr.choices}}">
              <option value="{{item.uri}}">{{item.label}}</option>
            </template>
          </select>
        </template>

      </template>
     
    </dom-module>

    <dom-module id="light9-live-device-control">
      <template>
        <style>
         .device {
             border: 2px solid #151e2d;
             margin: 4px;
             padding: 1px;
             background: #171717;  /* deviceClass gradient added later */
             break-inside: avoid-column;
             
         }
         .deviceAttr {
             border-top: 1px solid #272727;
             padding-bottom: 2px;
             display: flex;
         }
         .deviceAttr > span {

         }
         .deviceAttr > light9-live-control {
             flex-grow: 1;
         }
         h2 {
             font-size: 110%;
             padding: 4px;
         }
         .device, h2 {
         border-top-right-radius: 15px;
}

         #mainLabel {
             font-size: 120%; 
             color: #9ab8fd;
             text-decoration: initial;
         }
        </style>
        <div class="device">
          <h2 style$="[[bgStyle]]">
            <resource-display id="mainLabel" graph="{{graph}}" uri="{{uri}}"></resource-display>
            a <resource-display minor graph="{{graph}}" uri="{{deviceClass}}"></resource-display>
          </h2>
          <template is="dom-repeat" items="{{deviceAttrs}}" as="dattr">
            <div class="deviceAttr">
              <span>attr <resource-display minor graph="{{graph}}" uri="{{dattr.uri}}"></resource-display></span>
              <light9-live-control device="{{uri}}" device-attr="{{dattr}}"></light9-live-control>
            </div>
          </template>
        </div>
      </template>
    </dom-module>
    
    <dom-module id="light9-live-controls">
      <template>
        <style>
         #preview {
             width: 100%;
         }
         #deviceControls {
             column-width: 400px;
         }
         light9-live-device-control > div {
             break-inside: avoid-column;
         }
        </style>
        <rdfdb-synced-graph graph="{{graph}}"></rdfdb-synced-graph>

        <light9-collector-client self="{{client}}"></light9-collector-client>
        <h1>device control <button on-click="resendAll">resend all</button> <button on-click="clearAll">clear all</button></h1>

        <div id="save">
          <div>
            effect name: <input type="input" value="{{newEffectName::change}}">
            <button on-click="saveNewEffect">save new effect</button>
          </div>
          <textarea id="preview" value="{{effectPreview}}"></textarea>
        </div>

        <div id="deviceControls">
          <template is="dom-repeat" items="{{devices}}" as="device">
            <light9-live-device-control graph="{{graph}}" uri="{{device.uri}}"></light9-live-device-control>
          </template>
        </div>
        
      </template>
    </dom-module>
    
    <light9-live-controls></light9-live-controls>    

    <script src="live.js"></script>   
  </body>
</html>
